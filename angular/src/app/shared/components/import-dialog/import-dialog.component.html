<h2 mat-dialog-title>Importar Clientes {{ data.clienteType === 'fisico' ? 'Físicos' : 'Jurídicos' }}</h2>

<mat-dialog-content>
  <p>Selecione um arquivo para importação:</p>

  <div class="file-upload">
    <input (change)="onFileSelected($event)" accept=".xlsx,.csv" type="file"/>
    <span *ngIf="selectedFile" class="file-name">{{ selectedFile.name }}</span>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button [mat-dialog-close]="false" mat-button>Cancelar</button>
  <button (click)="downloadTemplate()" [disabled]="downloadingTemplate" mat-stroked-button>
    {{ downloadingTemplate ? 'Baixando...' : 'Baixar Template' }}
  </button>
  <button (click)="import()" [disabled]="!selectedFile" color="primary" mat-raised-button>
    Importar
  </button>
</mat-dialog-actions>

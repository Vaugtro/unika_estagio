<h2 mat-dialog-title>
  Importar {{ data.clienteType === 'fisico' ? 'Clientes Físicos' : data.clienteType === 'juridico' ? 'Clientes Jurídicos' : 'Endereços' }}
</h2>

<mat-dialog-content>
  <p>Selecione um arquivo para importação:</p>

  <div class="file-upload">
    <input (change)="onFileSelected($event)" accept=".xlsx,.csv" type="file"/>
    <span *ngIf="selectedFile" class="file-name">{{ selectedFile.name }}</span>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button [mat-dialog-close]="false" mat-button>Cancelar</button>
  <button (click)="downloadTemplate()" [disabled]="downloadingTemplate" mat-stroked-button>
    {{ downloadingTemplate ? 'Baixando...' : 'Baixar Template' }}
  </button>
  <button (click)="import()" [disabled]="!selectedFile || importing" color="primary" mat-raised-button>
    {{ importing ? 'Importando...' : 'Importar' }}
  </button>
</mat-dialog-actions>

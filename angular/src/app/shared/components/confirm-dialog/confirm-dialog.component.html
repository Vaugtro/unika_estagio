<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button [mat-dialog-close]="false" mat-button>{{ data.cancelText || 'Cancelar' }}</button>
  <button [mat-dialog-close]="true" color="primary" mat-raised-button>
    {{ data.confirmText || 'Confirmar' }}
  </button>
</mat-dialog-actions>

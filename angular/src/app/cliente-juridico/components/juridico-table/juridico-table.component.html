<mat-card>
  <mat-card-header>
    <mat-card-title>Clientes Jurídicos</mat-card-title>
    <div class="card-toolbar">
      <mat-form-field appearance="outline" class="search-field">
        <lucide-icon matPrefix name="search"></lucide-icon>
        <input
          [formControl]="searchControl"
          matInput
          placeholder="Buscar por razão social, CNPJ ou e-mail"
        />
        <button
          (click)="clearSearch()"
          *ngIf="searchControl.value"
          mat-icon-button
          matSuffix
        >
          <lucide-icon name="x"></lucide-icon>
        </button>
      </mat-form-field>
      <button (click)="openExport()" mat-stroked-button>
        <lucide-icon name="file-down"></lucide-icon>
        Exportar
      </button>
      <button (click)="openImport()" mat-stroked-button>
        <lucide-icon name="file-up"></lucide-icon>
        Importar
      </button>
      <button (click)="openCreate()" color="primary" mat-raised-button>
        <lucide-icon name="plus"></lucide-icon>
        Novo
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="loading" class="loading-overlay">
      <mat-spinner diameter="32"></mat-spinner>
    </div>

    <table *ngIf="!loading" [dataSource]="dataSource" mat-table>
      <ng-container matColumnDef="id">
        <th *matHeaderCellDef mat-header-cell>ID</th>
        <td *matCellDef="let row" mat-cell>{{ row.id }}</td>
      </ng-container>

      <ng-container matColumnDef="razaoSocial">
        <th *matHeaderCellDef mat-header-cell>Razão Social</th>
        <td *matCellDef="let row" mat-cell>
          <app-juridico-row-form
            (save)="saveInline(row)"
            (valueChange)="onInlineValueChange($event)"
            *ngIf="editingId === row.id; else razaoDisplay"
            [email]="row.email"
            [razaoSocial]="row.razaoSocial"
          ></app-juridico-row-form>
          <ng-template #razaoDisplay>{{ row.razaoSocial }}</ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="cnpj">
        <th *matHeaderCellDef mat-header-cell>CNPJ</th>
        <td *matCellDef="let row" mat-cell>{{ row.cnpj }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th *matHeaderCellDef mat-header-cell>E-mail</th>
        <td *matCellDef="let row" mat-cell>{{ row.email }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th *matHeaderCellDef mat-header-cell>Status</th>
        <td *matCellDef="let row" mat-cell>
          <button
            (click)="toggleStatus(row)"
            [ngClass]="row.estaAtivo ? 'badge-active' : 'badge-inactive'"
            mat-stroked-button
          >
            {{ row.estaAtivo ? 'Ativo' : 'Inativo' }}
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th *matHeaderCellDef mat-header-cell></th>
        <td *matCellDef="let row" class="actions-cell" mat-cell>
          <a *ngIf="editingId !== row.id" [routerLink]="['/juridico', row.id]" mat-button>
            <lucide-icon name="eye"></lucide-icon>
            Detalhes
          </a>
          <button
            (click)="startEdit(row)"
            *ngIf="editingId !== row.id"
            mat-button
          >
            <lucide-icon name="pencil"></lucide-icon>
            Editar
          </button>
          <button
            (click)="saveInline(row)"
            *ngIf="editingId === row.id"
            color="primary"
            mat-button
          >
            <lucide-icon name="save"></lucide-icon>
            Salvar
          </button>
          <button
            (click)="cancelEdit()"
            *ngIf="editingId === row.id"
            mat-button
          >
            Cancelar
          </button>
        </td>
      </ng-container>

      <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
      <tr
        *matRowDef="let row; columns: displayedColumns"
        [ngClass]="{ 'editing-row': editingId === row.id }"
        mat-row
      ></tr>
    </table>

    <mat-paginator
      (page)="onPageChange($event)"
      [length]="totalElements"
      [pageIndex]="page"
      [pageSizeOptions]="[5, 10, 25, 50]"
      [pageSize]="pageSize"
      showFirstLastButtons
    >
    </mat-paginator>
  </mat-card-content>
</mat-card>

<div [formGroup]="form" class="inline-edit-form">
  <mat-form-field appearance="outline">
    <input formControlName="razaoSocial" matInput placeholder="Razão Social"/>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <input formControlName="email" matInput placeholder="E-mail" type="email"/>
  </mat-form-field>
  <button (click)="onSave()" [disabled]="form.invalid" color="primary" mat-icon-button>
    <lucide-icon name="check"></lucide-icon>
  </button>
</div>

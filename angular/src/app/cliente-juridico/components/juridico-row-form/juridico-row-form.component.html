<div [formGroup]="form" class="inline-edit-form">
  <mat-form-field appearance="outline">
    <input matInput formControlName="razaoSocial" placeholder="Razão Social" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <input matInput formControlName="email" placeholder="E-mail" type="email" />
  </mat-form-field>
  <button mat-icon-button color="primary" (click)="onSave()" [disabled]="form.invalid">
    <lucide-icon name="check"></lucide-icon>
  </button>
</div>

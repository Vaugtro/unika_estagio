<div *ngIf="loading" class="loading-overlay">
  <mat-spinner diameter="32"></mat-spinner>
</div>

<div *ngIf="cliente && !loading">
  <a [routerLink]="['/home']" class="back-link" mat-button>
    <lucide-icon name="arrow-left"></lucide-icon>
    Voltar
  </a>

  <div class="detail-actions">
    <button (click)="openEdit()" color="primary" mat-raised-button>
      <lucide-icon name="pencil"></lucide-icon>
      Editar
    </button>
    <button *ngIf="!cliente.estaAtivo" (click)="delete()" color="warn" mat-raised-button>
      <lucide-icon name="trash-2"></lucide-icon>
      Excluir Cliente
    </button>
  </div>

  <app-juridico-info-card [cliente]="cliente"></app-juridico-info-card>

  <mat-card class="enderecos-card">
    <mat-card-header>
      <mat-card-title>Endereços</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <app-endereco-table [clienteId]="cliente.id!" [clienteType]="'juridico'"></app-endereco-table>
    </mat-card-content>
  </mat-card>
</div>

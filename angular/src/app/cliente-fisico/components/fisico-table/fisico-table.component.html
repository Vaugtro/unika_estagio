<mat-card>
  <mat-card-header>
    <mat-card-title>Clientes Físicos</mat-card-title>
    <div class="card-toolbar">
      <mat-form-field appearance="outline" class="search-field">
        <lucide-icon matPrefix name="search"></lucide-icon>
        <input
          matInput
          [formControl]="searchControl"
          placeholder="Buscar por nome, CPF, RG ou e-mail"
        />
        <button
          *ngIf="searchControl.value"
          matSuffix
          mat-icon-button
          (click)="clearSearch()"
        >
          <lucide-icon name="x"></lucide-icon>
        </button>
      </mat-form-field>
      <button mat-stroked-button (click)="openExport()">
        <div class="flex items-center gap-1.5"><lucide-icon name="file-down"></lucide-icon>
        Exportar
        </div>
      </button>
      <button mat-stroked-button (click)="openImport()">
        <lucide-icon name="file-up"></lucide-icon>
        Importar
      </button>
      <button mat-raised-button color="primary" (click)="openCreate()">
        <lucide-icon name="plus"></lucide-icon>
        Novo
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="loading" class="loading-overlay">
      <mat-spinner diameter="32"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" *ngIf="!loading">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let row">{{ row.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let row">
          <app-fisico-row-form
            *ngIf="editingId === row.id; else nomeDisplay"
            [nome]="row.nome"
            [email]="row.email"
            (save)="saveInline(row)"
            (valueChange)="onInlineValueChange($event)"
          ></app-fisico-row-form>
          <ng-template #nomeDisplay>{{ row.nome }}</ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="cpf">
        <th mat-header-cell *matHeaderCellDef>CPF</th>
        <td mat-cell *matCellDef="let row">{{ row.cpf }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mail</th>
        <td mat-cell *matCellDef="let row">{{ row.email }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <button
            mat-stroked-button
            [ngClass]="row.estaAtivo ? 'badge-active' : 'badge-inactive'"
            (click)="toggleStatus(row)"
          >
            {{ row.estaAtivo ? 'Ativo' : 'Inativo' }}
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
          <a mat-button [routerLink]="['/fisico', row.id]" *ngIf="editingId !== row.id">
            <lucide-icon name="eye"></lucide-icon>
            Detalhes
          </a>
          <button
            mat-button
            (click)="startEdit(row)"
            *ngIf="editingId !== row.id"
          >
            <lucide-icon name="pencil"></lucide-icon>
            Editar
          </button>
          <button
            mat-button
            color="primary"
            (click)="saveInline(row)"
            *ngIf="editingId === row.id"
          >
            <lucide-icon name="save"></lucide-icon>
            Salvar
          </button>
          <button
            mat-button
            (click)="cancelEdit()"
            *ngIf="editingId === row.id"
          >
            Cancelar
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        [ngClass]="{ 'editing-row': editingId === row.id }"
      ></tr>
    </table>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageIndex]="page"
      (page)="onPageChange($event)"
      [pageSizeOptions]="[5, 10, 25, 50]"
      showFirstLastButtons
    >
    </mat-paginator>
  </mat-card-content>
</mat-card>

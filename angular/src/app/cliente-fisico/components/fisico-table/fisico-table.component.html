<mat-card>
  <mat-card-header>
    <mat-card-title>Clientes Físicos</mat-card-title>
    <div class="card-toolbar">
      <mat-form-field appearance="outline" class="search-field">
        <lucide-icon matPrefix name="search"></lucide-icon>
        <input
          [formControl]="searchControl"
          matInput
          placeholder="Buscar por nome, CPF, RG ou e-mail"
        />
        <button
          (click)="clearSearch()"
          *ngIf="searchControl.value"
          mat-icon-button
          matSuffix
        >
          <lucide-icon name="x"></lucide-icon>
        </button>
      </mat-form-field>
      <button (click)="openExport()" mat-stroked-button>
        <div class="flex items-center gap-1.5">
          <lucide-icon name="file-down"></lucide-icon>
          Exportar
        </div>
      </button>
      <button (click)="openImport()" mat-stroked-button>
        <lucide-icon name="file-up"></lucide-icon>
        Importar
      </button>
      <button (click)="openCreate()" color="primary" mat-raised-button>
        <lucide-icon name="plus"></lucide-icon>
        Novo
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <div *ngIf="loading" class="loading-overlay">
      <mat-spinner diameter="32"></mat-spinner>
    </div>

    <table *ngIf="!loading" [dataSource]="dataSource" mat-table>
      <ng-container matColumnDef="id">
        <th *matHeaderCellDef mat-header-cell>ID</th>
        <td *matCellDef="let row" mat-cell>{{ row.id }}</td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th *matHeaderCellDef mat-header-cell>Nome</th>
        <td *matCellDef="let row" mat-cell>{{ row.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="cpf">
        <th *matHeaderCellDef mat-header-cell>CPF</th>
        <td *matCellDef="let row" mat-cell>{{ row.cpf }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th *matHeaderCellDef mat-header-cell>E-mail</th>
        <td *matCellDef="let row" mat-cell>{{ row.email }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th *matHeaderCellDef mat-header-cell>Status</th>
        <td *matCellDef="let row" mat-cell>
          <button
            (click)="toggleStatus(row)"
            [ngClass]="row.estaAtivo ? 'badge-active' : 'badge-inactive'"
            mat-stroked-button
          >
            {{ row.estaAtivo ? 'Ativo' : 'Inativo' }}
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th *matHeaderCellDef mat-header-cell></th>
        <td *matCellDef="let row" class="actions-cell" mat-cell>
          <a [routerLink]="['/fisico', row.id]" mat-button>
            <lucide-icon name="eye"></lucide-icon>
            Detalhes
          </a>
          <button (click)="openEdit(row)" mat-button>
            <lucide-icon name="pencil"></lucide-icon>
            Editar
          </button>
        </td>
      </ng-container>

      <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
      <tr
        *matRowDef="let row; columns: displayedColumns"
        mat-row
      ></tr>
    </table>

    <mat-paginator
      (page)="onPageChange($event)"
      [length]="totalElements"
      [pageIndex]="page"
      [pageSizeOptions]="[5, 10, 25, 50]"
      [pageSize]="pageSize"
      showFirstLastButtons
    >
    </mat-paginator>
  </mat-card-content>
</mat-card>

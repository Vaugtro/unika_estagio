<h2 mat-dialog-title>Novo Cliente Físico</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <div class="form-grid-2">
      <mat-form-field appearance="outline">
        <mat-label>CPF</mat-label>
        <input
          matInput
          formControlName="cpf"
          mask="000.000.000-00"
          [dropSpecialCharacters]="false"
        />
        <mat-error *ngIf="form.get('cpf')?.invalid && form.get('cpf')?.touched">
          {{ getFieldError('cpf') }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Data Nascimento</mat-label>
        <input matInput formControlName="dataNascimento" type="date" />
        <mat-error *ngIf="form.get('dataNascimento')?.invalid && form.get('dataNascimento')?.touched">
          Campo obrigatório
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" />
        <mat-error *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
          {{ getFieldError('nome') }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>RG</mat-label>
        <input matInput formControlName="rg" />
        <mat-error *ngIf="form.get('rg')?.invalid && form.get('rg')?.touched">
          {{ getFieldError('rg') }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>E-mail</mat-label>
        <input matInput formControlName="email" type="email" />
        <mat-error *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          {{ getFieldError('email') }}
        </mat-error>
      </mat-form-field>
    </div>

    <h3 class="section-title">Endereços</h3>
    <app-endereco-form #enderecoForm></app-endereco-form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" [mat-dialog-close]="false">Cancelar</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="submitting">
      {{ submitting ? 'Salvando...' : 'Salvar' }}
    </button>
  </mat-dialog-actions>
</form>

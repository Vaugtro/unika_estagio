<div class="table-toolbar">
  <button mat-stroked-button (click)="openExport()">
    <lucide-icon name="file-down"></lucide-icon>
    Exportar
  </button>
  <button mat-stroked-button (click)="openImport()">
    <lucide-icon name="file-up"></lucide-icon>
    Importar
  </button>
  <button mat-raised-button color="primary" (click)="openCreate()">
    <lucide-icon name="plus"></lucide-icon>
    Novo
  </button>
</div>

<div *ngIf="loading" class="loading-overlay">
  <mat-spinner diameter="32"></mat-spinner>
</div>

<div *ngIf="!loading">
  <table mat-table [dataSource]="dataSource" *ngIf="dataSource.length > 0">
    <ng-container matColumnDef="logradouro">
      <th mat-header-cell *matHeaderCellDef>Logradouro</th>
      <td mat-cell *matCellDef="let row">{{ row.logradouro }}</td>
    </ng-container>

    <ng-container matColumnDef="numero">
      <th mat-header-cell *matHeaderCellDef>Número</th>
      <td mat-cell *matCellDef="let row">{{ row.numero }}</td>
    </ng-container>

    <ng-container matColumnDef="bairro">
      <th mat-header-cell *matHeaderCellDef>Bairro</th>
      <td mat-cell *matCellDef="let row">{{ row.bairro }}</td>
    </ng-container>

    <ng-container matColumnDef="cidade">
      <th mat-header-cell *matHeaderCellDef>Cidade</th>
      <td mat-cell *matCellDef="let row">{{ row.cidade }}</td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let row">{{ row.estado }}</td>
    </ng-container>

    <ng-container matColumnDef="cep">
      <th mat-header-cell *matHeaderCellDef>CEP</th>
      <td mat-cell *matCellDef="let row">{{ row.cep }}</td>
    </ng-container>

    <ng-container matColumnDef="principal">
      <th mat-header-cell *matHeaderCellDef>Principal</th>
      <td mat-cell *matCellDef="let row">
        <button
          mat-stroked-button
          [ngClass]="row.principal ? 'badge-active' : 'badge-inactive'"
          (click)="setAsPrincipal(row)"
        >
          {{ row.principal ? 'Sim' : 'Não' }}
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row" class="actions-cell">
        <button mat-button color="warn" (click)="delete(row)">
          <lucide-icon name="trash-2"></lucide-icon>
          Excluir
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="dataSource.length === 0 && !loading" class="empty-state">
    Nenhum endereço cadastrado para este cliente.
  </div>

  <mat-paginator
    *ngIf="totalElements > pageSize"
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageIndex]="page"
    (page)="onPageChange($event)"
    [pageSizeOptions]="[5, 10, 25, 50]"
    showFirstLastButtons
  >
  </mat-paginator>
</div>

<div class="table-toolbar">
  <button (click)="openExport()" mat-stroked-button>
    <lucide-icon name="file-down"></lucide-icon>
    Exportar
  </button>
  <button (click)="openImport()" mat-stroked-button>
    <lucide-icon name="file-up"></lucide-icon>
    Importar
  </button>
  <button (click)="openCreate()" color="primary" mat-raised-button>
    <lucide-icon name="plus"></lucide-icon>
    Novo
  </button>
</div>

<div *ngIf="loading" class="loading-overlay">
  <mat-spinner diameter="32"></mat-spinner>
</div>

<div *ngIf="!loading">
  <table *ngIf="dataSource.length > 0" [dataSource]="dataSource" mat-table>
    <ng-container matColumnDef="logradouro">
      <th *matHeaderCellDef mat-header-cell>Logradouro</th>
      <td *matCellDef="let row" mat-cell>{{ row.logradouro }}</td>
    </ng-container>

    <ng-container matColumnDef="numero">
      <th *matHeaderCellDef mat-header-cell>Número</th>
      <td *matCellDef="let row" mat-cell>{{ row.numero }}</td>
    </ng-container>

    <ng-container matColumnDef="bairro">
      <th *matHeaderCellDef mat-header-cell>Bairro</th>
      <td *matCellDef="let row" mat-cell>{{ row.bairro }}</td>
    </ng-container>

    <ng-container matColumnDef="cidade">
      <th *matHeaderCellDef mat-header-cell>Cidade</th>
      <td *matCellDef="let row" mat-cell>{{ row.cidade }}</td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th *matHeaderCellDef mat-header-cell>Estado</th>
      <td *matCellDef="let row" mat-cell>{{ row.estado }}</td>
    </ng-container>

    <ng-container matColumnDef="cep">
      <th *matHeaderCellDef mat-header-cell>CEP</th>
      <td *matCellDef="let row" mat-cell>{{ row.cep }}</td>
    </ng-container>

    <ng-container matColumnDef="principal">
      <th *matHeaderCellDef mat-header-cell>Principal</th>
      <td *matCellDef="let row" mat-cell>
        <button
          (click)="setAsPrincipal(row)"
          [ngClass]="row.principal ? 'badge-active' : 'badge-inactive'"
          mat-stroked-button
        >
          {{ row.principal ? 'Sim' : 'Não' }}
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th *matHeaderCellDef mat-header-cell></th>
      <td *matCellDef="let row" class="actions-cell" mat-cell>
        <button (click)="delete(row)" color="warn" mat-button>
          <lucide-icon name="trash-2"></lucide-icon>
          Excluir
        </button>
      </td>
    </ng-container>

    <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
    <tr *matRowDef="let row; columns: displayedColumns" mat-row></tr>
  </table>

  <div *ngIf="dataSource.length === 0 && !loading" class="empty-state">
    Nenhum endereço cadastrado para este cliente.
  </div>

  <mat-paginator
    (page)="onPageChange($event)"
    *ngIf="totalElements > pageSize"
    [length]="totalElements"
    [pageIndex]="page"
    [pageSizeOptions]="[5, 10, 25, 50]"
    [pageSize]="pageSize"
    showFirstLastButtons
  >
  </mat-paginator>
</div>

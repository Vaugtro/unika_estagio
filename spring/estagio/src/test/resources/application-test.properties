# Test profile — datasource URL is overridden by AbstractIntegrationTest @DynamicPropertySource
# (throwaway Testcontainers MariaDB container). All other settings live here.
# JPA — let Hibernate create tables on the throwaway container (Flyway auto-config
# is unreliable on Spring Boot 4.x for test profiles)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
# Flyway — disabled; Hibernate DDL handles schema on the throwaway container
spring.flyway.enabled=false
# Prevent Spring Boot from replacing datasource with embedded DB
spring.test.database.replace=none
# Logging
logging.level.com.desafio.estagio=DEBUG
logging.level.org.springframework.test=WARN

<wicket:panel xmlns:wicket="http://www.w3.org/1999/xhtml">
    <style>
        .is-invalid {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;
        }
    </style>

    <div class="card shadow-sm border-0 mt-4" style="border-radius: 12px; overflow: hidden;">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3"
             style="border-bottom: 3px solid #6f42c1;">
            <h5 class="mb-0 fw-semibold"><i data-lucide="map-pin" style="width: 20px; height: 20px;"></i> Endereços</h5>
            <div class="d-flex gap-2 align-items-center flex-wrap">
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" data-bs-target="#exportEnderecoModal"
                        data-bs-toggle="modal" type="button">
                    <i data-lucide="download" style="width: 14px; height: 14px;"></i> Exportar
                </button>
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" data-bs-target="#importEnderecoModal"
                        data-bs-toggle="modal" type="button">
                    <i data-lucide="upload" style="width: 14px; height: 14px;"></i> Importar
                </button>
                <a class="btn btn-primary btn-sm rounded-pill px-3" wicket:id="adicionarEnderecoBtn">
                    <i data-lucide="plus" style="width: 14px; height: 14px;"></i> Adicionar
                </a>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="py-3">Logradouro</th>
                        <th class="py-3">Nº</th>
                        <th class="py-3">Bairro</th>
                        <th class="py-3">CEP</th>
                        <th class="py-3">Cidade</th>
                        <th class="py-3">UF</th>
                        <th class="py-3">Telefone</th>
                        <th class="py-3">Principal</th>
                        <th class="py-3">Ações</th>
                    </tr>
                    </thead>
                    <tbody class="table-group-divider" wicket:id="enderecosContainer">
                    <tr class="align-middle" wicket:id="enderecoRow">
                        <td wicket:id="logradouro"></td>
                        <td wicket:id="numero"></td>
                        <td wicket:id="bairro"></td>
                        <td wicket:id="cep"></td>
                        <td wicket:id="cidade"></td>
                        <td wicket:id="estado"></td>
                        <td wicket:id="telefone"></td>
                        <td>
                            <a class="btn btn-sm" style="min-width: 70px;" wicket:id="setAsPrincipalBtn">
                                <span wicket:id="principalLabel"></span>
                            </a>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <a class="btn btn-sm btn-outline-primary rounded-circle p-1"
                                   style="width: 32px; height: 32px;"
                                   wicket:id="editarBtn">
                                    <i data-lucide="edit" style="width: 16px; height: 16px;"></i>
                                </a>
                                <a class="btn btn-sm btn-outline-danger rounded-circle p-1"
                                   style="width: 32px; height: 32px;"
                                   wicket:id="excluirBtn">
                                    <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for Add/Edit Endereco -->
    <div aria-hidden="true" class="modal fade" id="enderecoModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <form wicket:id="modalForm">
                    <div class="modal-header">
                        <h5 class="modal-title" wicket:id="enderecoModalLabel">Novo Endereço</h5>
                        <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                    </div>
                    <div class="modal-body">
                        <div wicket:id="enderecoTablePanel"></div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancelar</button>
                        <button class="btn btn-primary" type="submit" wicket:id="salvarEnderecoBtn">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div wicket:id="exportModal"></div>
    <div wicket:id="importModal"></div>

</wicket:panel>

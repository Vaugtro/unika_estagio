<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <title>Home - Clientes</title>
</head>
<body>
<wicket:extend>
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-center">
            <div class="btn-group shadow-sm rounded-pill overflow-hidden" role="group"
                 style="border: 1px solid #dee2e6;">
                <a class="btn d-flex align-items-center gap-2 px-4 py-2 fw-medium"
                   style="background: white; color: #495057; transition: all 0.2s;"
                   wicket:id="btnFisicos">
                    <i data-lucide="users" style="width: 18px; height: 18px;"></i>
                    <span>Clientes Físicos</span>
                </a>
                <a class="btn d-flex align-items-center gap-2 px-4 py-2 fw-medium"
                   style="background: white; color: #495057; transition: all 0.2s;"
                   wicket:id="btnJuridicos">
                    <i data-lucide="building-2" style="width: 18px; height: 18px;"></i>
                    <span>Clientes Jurídicos</span>
                </a>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div wicket:id="panelContainer">
                <div wicket:id="currentPanel"></div>
            </div>
        </div>
    </div>

</wicket:extend>
</body>
</html>

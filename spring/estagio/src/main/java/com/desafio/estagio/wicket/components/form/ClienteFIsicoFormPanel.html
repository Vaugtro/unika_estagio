<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="card">
        <div class="card-header">
            <h3>Cadastro de Cliente</h3>
        </div>

        <div class="card-body">
            <div wicket:id="feedback" class="mb-3"></div>

            <form wicket:id="form">
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Tipo de Cliente *</label>
                        <select wicket:id="tipoCliente" class="form-select">
                            <option value="">Selecione</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Email *</label>
                        <input type="email" wicket:id="email" class="form-control" />
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Status</label>
                        <select wicket:id="estaAtivo" class="form-select">
                            <option value="true">Ativo</option>
                            <option value="false">Inativo</option>
                        </select>
                    </div>
                </div>

                <!-- Container para formulários dinâmicos (PF ou PJ) -->
                <div wicket:id="dynamicForm" class="mt-3">
                    <!-- O conteúdo dinâmico será inserido aqui -->
                    <div wicket:id="content"></div>
                </div>

                <div class="mt-4">
                    <button type="button" wicket:id="adicionarEndereco" class="btn btn-info me-2">
                        + Adicionar Endereço
                    </button>

                    <button type="submit" wicket:id="salvar" class="btn btn-primary me-2">
                        Salvar Cliente
                    </button>

                    <button type="button" wicket:id="limpar" class="btn btn-secondary">
                        Limpar
                    </button>
                </div>
            </form>
        </div>
    </div>
</wicket:panel>
</html>

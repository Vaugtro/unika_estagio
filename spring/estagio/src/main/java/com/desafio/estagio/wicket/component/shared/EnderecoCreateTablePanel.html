<wicket:panel xmlns:wicket="http://www.w3.org/1999/xhtml">
    <style>
        .endereco-table-wrapper {
            position: relative;
        }

        .cep-loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 1055;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10%;
            border-radius: 0.375rem;
        }

        .cep-loading-overlay.active {
            display: flex !important;
        }

        .cep-loading-overlay .spinner-border {
            width: 3rem;
            height: 3rem;
        }

        .endereco-table td {
            position: relative;
            vertical-align: middle;
        }

        .endereco-table .invalid-feedback {
            font-size: 0.7rem;
        }
    </style>
    <div class="endereco-table-wrapper">
        <div class="cep-loading-overlay" id="cepLoadingOverlay">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Consultando CEP...</span>
            </div>
        </div>
        <table class="table table-bordered table-sm mb-2 endereco-table">
            <thead class="table-secondary">
            <tr>
                <th>Logradouro</th>
                <th>Nº</th>
                <th>Bairro</th>
                <th>CEP</th>
                <th>Cidade</th>
                <th>UF</th>
                <th>Telefone</th>
                <th>Complemento</th>
                <th>Principal</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr wicket:id="enderecosRow">
                <td>
                    <input class="form-control form-control-sm" type="text" wicket:id="logradouro"/>
                    <span class="invalid-feedback" wicket:id="logradouroFeedback"></span>
                </td>
                <td>
                    <input class="form-control form-control-sm" style="width:80px" type="text" wicket:id="numero"/>
                    <span class="invalid-feedback" wicket:id="numeroFeedback"></span>
                </td>
                <td>
                    <input class="form-control form-control-sm" type="text" wicket:id="bairro"/>
                    <span class="invalid-feedback" wicket:id="bairroFeedback"></span>
                </td>
                <td>
                    <input class="form-control form-control-sm" style="width:120px" type="text" wicket:id="cep"/>
                    <span class="invalid-feedback" wicket:id="cepFeedback"></span>
                </td>
                <td>
                    <input class="form-control form-control-sm" type="text" wicket:id="cidade"/>
                    <span class="invalid-feedback" wicket:id="cidadeFeedback"></span>
                </td>
                <td>
                    <input class="form-control form-control-sm" style="width:60px" type="text" wicket:id="estado"/>
                    <span class="invalid-feedback" wicket:id="estadoFeedback"></span>
                </td>
                <td>
                    <input class="form-control form-control-sm" style="width:140px" type="text" wicket:id="telefone"/>
                    <span class="invalid-feedback" wicket:id="telefoneFeedback"></span>
                </td>
                <td>
                    <input class="form-control form-control-sm" type="text" wicket:id="complemento"/>
                    <span class="invalid-feedback" wicket:id="complementoFeedback"></span>
                </td>
                <td class="text-center"><input type="checkbox" wicket:id="principal"/></td>
                <td class="text-center">
                    <a class="btn btn-sm btn-outline-danger" wicket:id="removeBtn">
                        <i data-lucide="trash-2"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <a class="btn btn-sm btn-outline-secondary" wicket:id="addEndereco">
        <i data-lucide="plus"></i> Adicionar Endereço
    </a>
    <script>
        var viacepLastCallbackId = 0;

        function pesquisacep(input) {
            var cep = input.value.replace(/\D/g, '');
            if (cep.length !== 8) {
                return;
            }
            var $row = $(input).closest('tr');
            var overlay = document.getElementById('cepLoadingOverlay');
            if (overlay) overlay.classList.add('active');

            var callbackId = 'viacepCallback_' + (++viacepLastCallbackId);
            var script = document.createElement('script');
            script.src = 'https://viacep.com.br/ws/' + cep + '/json/?callback=' + callbackId;

            window[callbackId] = function (data) {
                if (!data.erro) {
                    $row.find('input[data-field="logradouro"]').val(data.logradouro);
                    $row.find('input[data-field="bairro"]').val(data.bairro);
                    $row.find('input[data-field="cidade"]').val(data.localidade);
                    $row.find('input[data-field="estado"]').val(data.uf);
                } else {
                    var msg = 'CEP n\u00e3o encontrado.';
                    if (typeof window.showToast === 'function') {
                        window.showToast('warning', msg);
                    } else {
                        alert(msg);
                    }
                }
                if (overlay) overlay.classList.remove('active');
                try {
                    delete window[callbackId];
                } catch (e) {
                }
                if (script.parentNode) script.parentNode.removeChild(script);
            };

            script.onerror = function () {
                if (overlay) overlay.classList.remove('active');
                try {
                    delete window[callbackId];
                } catch (e) {
                }
                if (script.parentNode) script.parentNode.removeChild(script);
                var msg = 'Erro ao consultar CEP.';
                if (typeof window.showToast === 'function') {
                    window.showToast('error', msg);
                } else {
                    alert(msg);
                }
            };

            document.body.appendChild(script);
        }
    </script>
</wicket:panel>

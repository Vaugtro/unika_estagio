<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <title>Home - Clientes</title>
</head>
<body>
<wicket:extend>
    <div class="row mb-4">
        <div class="col-12">
            <div class="btn-group" role="group">
                <a class="btn btn-primary d-flex align-items-center gap-2" wicket:id="btnFisicos">
                    <i data-lucide="users"></i>
                    <span>Clientes Físicos</span>
                </a>
                <button class="btn btn-primary d-flex align-items-center gap-2" wicket:id="btnJuridicos">
                    <i data-lucide="building-2"></i>
                    <span>Clientes Jurídicos</span>
                </button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div wicket:id="panelContainer">
                <div wicket:id="currentPanel"></div>
            </div>
        </div>
    </div>
</wicket:extend>
</body>
</html>

<wicket:panel xmlns:wicket="http://www.w3.org/1999/xhtml">
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i data-lucide="building"></i> Clientes Jurídicos
            </h5>
            <div>
                <button wicket:id="novoClienteBtn" class="btn btn-sm btn-primary">
                    <i data-lucide="plus"></i> Novo Cliente
                </button>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Razão Social</th>
                        <th>Nome Fantasia</th>
                        <th>CNPJ</th>
                        <th>Inscrição Estadual</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr wicket:id="rows">
                        <td wicket:id="id">1</td>
                        <td wicket:id="razaoSocial">Empresa ABC Ltda</td>
                        <td wicket:id="nomeFantasia">ABC Comércio</td>
                        <td wicket:id="cnpj">12.345.678/0001-90</td>
                        <td wicket:id="inscricaoEstadual">123.456.789</td>
                        <td wicket:id="email">contato@empresa.com</td>
                        <td wicket:id="telefone">(11) 99999-9999</td>
                        <td><span wicket:id="status">Ativo</span></td>
                        <td class="text-center">
                            <a wicket:id="editLink" class="btn btn-sm btn-warning me-1" title="Editar">
                                <i data-lucide="edit"></i>
                            </a>
                            <a wicket:id="deleteLink" class="btn btn-sm btn-danger" title="Excluir">
                                <i data-lucide="trash-2"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white">
            <div wicket:id="navigator" class="d-flex justify-content-center"></div>
        </div>
    </div>
</wicket:panel>

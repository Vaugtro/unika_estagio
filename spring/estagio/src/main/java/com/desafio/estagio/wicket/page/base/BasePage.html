<!DOCTYPE html>
<html lang="pt-BR" xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8">
    <title>My App</title>
    <wicket:head>
        <!-- CSS from CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com" rel="preconnect">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@latest"></script>

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

        <!-- Bootstrap 5 JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <style>
            body {
                font-family: 'Inter', sans-serif;
                background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
                min-height: 100vh;
            }

            .toast-container {
                position: fixed;
                bottom: 20px;
                right: 20px;
                z-index: 9999;
            }

            .toast {
                opacity: 1 !important;
            }

            .form-control.is-invalid {
                border-color: #dc3545 !important;
                box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
            }

            .table tr {
                transition: background-color 0.15s ease;
            }

            .btn {
                transition: all 0.2s ease;
            }

            .btn-group .btn:hover {
                filter: brightness(0.95);
            }

            .card {
                transition: box-shadow 0.2s ease;
            }

            .card:hover {
                box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1) !important;
            }

            [data-lucide] {
                vertical-align: middle;
            }
        </style>
        <script>
            // Initialize Lucide icons
            document.addEventListener('DOMContentLoaded', function () {
                lucide.createIcons();
            });

            // Reinitialize after Wicket AJAX updates
            if (typeof Wicket !== 'undefined') {
                Wicket.Event.subscribe('/ajax/call/response', function () {
                    lucide.createIcons();
                });
            }

            window.showToast = function (type, message) {
                console.log('Showing toast:', type, message);

                // Get or create toast container
                let toastContainer = document.getElementById('toast-container');
                if (!toastContainer) {
                    toastContainer = document.createElement('div');
                    toastContainer.id = 'toast-container';
                    toastContainer.className = 'toast-container';
                    document.body.appendChild(toastContainer);
                }

                // Determine header color and icon based on type
                let headerClass = '';
                let icon = '';
                switch (type) {
                    case 'success':
                        headerClass = 'bg-success text-white';
                        icon = '✅';
                        break;
                    case 'error':
                        headerClass = 'bg-danger text-white';
                        icon = '❌';
                        break;
                    case 'warning':
                        headerClass = 'bg-warning text-dark';
                        icon = '⚠️';
                        break;
                    case 'info':
                        headerClass = 'bg-info text-white';
                        icon = 'ℹ️';
                        break;
                    default:
                        headerClass = 'bg-secondary text-white';
                        icon = '📢';
                }

                // Create unique ID for this toast
                const toastId = 'toast-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);

                // Create toast HTML
                const toastHtml = `
                    <div id="${toastId}" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="5000">
                        <div class="toast-header ${headerClass}">
                            <strong class="me-auto">${icon} ${type.charAt(0).toUpperCase() + type.slice(1)}</strong>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                        <div class="toast-body">
                            ${message}
                        </div>
                    </div>
                `;

                // Add toast to container
                toastContainer.insertAdjacentHTML('beforeend', toastHtml);

                // Initialize and show the toast
                const toastElement = document.getElementById(toastId);
                const toast = new bootstrap.Toast(toastElement, {
                    animation: true,
                    autohide: true,
                    delay: 5000
                });

                // Remove toast from DOM after it's hidden
                toastElement.addEventListener('hidden.bs.toast', function () {
                    toastElement.remove();
                });

                toast.show();
            };
        </script>
    </wicket:head>
</head>
<body>
<header class="navbar navbar-dark shadow-sm" style="background: linear-gradient(135deg, #212529 0%, #343a40 100%);">
    <div wicket:id="debug"></div>
    <div class="container">
        <a class="navbar-brand fw-semibold" href="#">
            <i class="me-2" data-lucide="briefcase"></i> Desafio Estágio
        </a>
    </div>
</header>

<main class="container mt-4">
    <wicket:child/> <!-- Child page content goes here -->
</main>
</body>
</html>

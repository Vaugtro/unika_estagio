<wicket:panel xmlns:wicket="http://www.w3.org/1999/xhtml">
    <div aria-hidden="true" class="modal fade" wicket:id="modalRoot" role="dialog" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content" style="border-radius: 12px;">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-semibold">
                        <i data-lucide="upload" style="width: 18px; height: 18px;"></i> Importar
                    </h5>
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-4">
                        <label class="form-label small fw-medium text-muted mb-2">
                            <i data-lucide="download" style="width: 14px; height: 14px;"></i> Baixe o modelo de planilha
                        </label>
                        <a class="btn btn-outline-info rounded-pill px-3 w-100" wicket:id="downloadTemplate">
                            <i data-lucide="file-down" style="width: 16px; height: 16px;"></i> Download Template
                        </a>
                    </div>
                    <hr>
                    <form wicket:id="importForm">
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted mb-2">
                                <i data-lucide="file-up" style="width: 14px; height: 14px;"></i> Selecione o arquivo preenchido
                            </label>
                            <input type="file" wicket:id="fileUpload" class="form-control form-control-sm"
                                   accept=".xlsx"/>
                        </div>
                        <button class="btn btn-outline-warning rounded-pill px-3 w-100" type="submit" wicket:id="importBtn">
                            <i data-lucide="upload" style="width: 16px; height: 16px;"></i> Importar
                        </button>
                    </form>
                </div>
                <div class="modal-footer border-top-0 justify-content-center">
                    <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal" type="button">Fechar</button>
                </div>
            </div>
        </div>
    </div>
</wicket:panel>

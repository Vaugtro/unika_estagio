<wicket:panel xmlns:wicket="http://www.w3.org/1999/xhtml">
    <style>
        .import-loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.88);
            z-index: 1060;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .import-loading-overlay.active {
            display: flex !important;
        }

        .import-loading-overlay .spinner-border {
            width: 2.5rem;
            height: 2.5rem;
        }
    </style>
    <div aria-hidden="true" class="modal fade" role="dialog" style="position: relative;" tabindex="-1" wicket:id="modalRoot">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content" style="border-radius: 12px;">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-semibold">
                        <i data-lucide="upload" style="width: 18px; height: 18px;"></i> Importar
                    </h5>
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="import-loading-overlay" id="importLoadingOverlay">
                    <div class="text-center">
                        <div class="spinner-border text-primary mb-2" role="status">
                            <span class="visually-hidden">Importando...</span>
                        </div>
                        <div class="small text-muted">Importando dados...</div>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="mb-4">
                        <label class="form-label small fw-medium text-muted mb-2">
                            <i data-lucide="download" style="width: 14px; height: 14px;"></i> Baixe o modelo de planilha
                        </label>
                        <a class="btn btn-outline-info rounded-pill px-3 w-100" wicket:id="downloadTemplate">
                            <i data-lucide="file-down" style="width: 16px; height: 16px;"></i> Download Template
                        </a>
                    </div>
                    <hr>
                    <form wicket:id="importForm">
                        <div class="mb-3">
                            <label class="form-label small fw-medium text-muted mb-2">
                                <i data-lucide="file-up" style="width: 14px; height: 14px;"></i> Selecione o arquivo
                                preenchido
                            </label>
                            <input accept=".xlsx" class="form-control form-control-sm" type="file"
                                   wicket:id="fileUpload"/>
                        </div>
                        <button class="btn btn-outline-warning rounded-pill px-3 w-100" type="submit"
                                wicket:id="importBtn">
                            <i data-lucide="upload" style="width: 16px; height: 16px;"></i> Importar
                        </button>
                    </form>
                </div>
                <div class="modal-footer border-top-0 justify-content-center">
                    <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal" type="button">Fechar
                    </button>
                </div>
            </div>
        </div>
    </div>
</wicket:panel>

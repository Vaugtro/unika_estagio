<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i data-lucide="users"></i> Clientes Juridico
            </h5>
            <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createClienteJuridicoModal">
                <i data-lucide="plus"></i> Novo
            </button>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0" wicket:id="tableContainer">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Razão Social</th>
                        <th>CNPJ</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr wicket:id="rows">
                        <form wicket:id="editarForm">
                            <td wicket:id="id">?</td>
                            <td><input wicket:id="razaoSocial" type="text" class="form-control form-control-sm"/></td>
                            <td wicket:id="cnpj">?</td>
                            <td><input wicket:id="email" type="text" class="form-control form-control-sm"/></td>
                            <td>
                                <a wicket:id="statusBtn">
                                    <span wicket:id="status"></span>
                                </a>
                            </td>
                            <td class="d-flex gap-1">
                                <button type="submit" class="btn btn-sm btn-warning" wicket:id="editarBtn">
                                    <i data-lucide="save"></i> Salvar
                                </button>
                            </td>
                        </form>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white">
            <div class="d-flex justify-content-center" wicket:id="navigator"></div>
        </div>
    </div>
    <div wicket:id="createModal"></div>
</wicket:panel>
</html>

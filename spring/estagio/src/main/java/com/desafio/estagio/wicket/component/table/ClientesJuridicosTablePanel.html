<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org" lang="pt-BR">
<wicket:panel>
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0">
                <i data-lucide="users"></i> Clientes Físicos
            </h5>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0" wicket:id="tableContainer">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Razão Social</th>
                        <th>CNPJ</th>
                        <th>Email</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr wicket:id="rows">
                        <td wicket:id="id">?</td>
                        <td wicket:id="razaoSocial">?</td>
                        <td wicket:id="cnpj">?</td>
                        <td wicket:id="email">?</td>
                        <td><span wicket:id="status"></span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white">
            <div wicket:id="navigator" class="d-flex justify-content-center"></div>
        </div>
    </div>
</wicket:panel>
</html>

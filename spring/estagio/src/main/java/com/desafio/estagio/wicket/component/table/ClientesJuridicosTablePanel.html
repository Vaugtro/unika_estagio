<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3"
             style="border-bottom: 3px solid #198754;">
            <h5 class="mb-0 fw-semibold">
                <i data-lucide="building-2" style="width: 20px; height: 20px;"></i> Clientes Jurídicos
            </h5>
            <div class="d-flex gap-2 align-items-center flex-wrap">
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" data-bs-target="#exportJuridicoModal"
                        data-bs-toggle="modal"
                        type="button">
                    <i data-lucide="download" style="width: 14px; height: 14px;"></i> Exportar
                </button>
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" data-bs-target="#importJuridicoModal"
                        data-bs-toggle="modal"
                        type="button">
                    <i data-lucide="upload" style="width: 14px; height: 14px;"></i> Importar
                </button>
                <button class="btn btn-primary btn-sm rounded-pill px-3" data-bs-target="#createClienteJuridicoModal"
                        data-bs-toggle="modal"
                        type="button">
                    <i data-lucide="plus" style="width: 14px; height: 14px;"></i> Novo
                </button>
            </div>
        </div>

        <div class="card-body p-0">
            <form class="d-flex gap-2 p-3 border-bottom bg-light align-items-center" wicket:id="searchForm">
                <i data-lucide="search" style="width: 18px; height: 18px; color: #6c757d;"></i>
                <input class="form-control form-control-sm" placeholder="Buscar por nome, CNPJ, IE ou email..."
                       type="text"
                       wicket:id="searchField"/>
                <a class="btn btn-outline-secondary btn-sm rounded-pill px-3" wicket:id="clearSearchBtn">
                    <i data-lucide="x" style="width: 14px; height: 14px;"></i> Limpar
                </a>
            </form>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" wicket:id="tableContainer">
                    <thead class="table-dark">
                    <tr>
                        <th class="py-3">ID</th>
                        <th class="py-3">Razão Social</th>
                        <th class="py-3">CNPJ</th>
                        <th class="py-3">Email</th>
                        <th class="py-3">Status</th>
                        <th class="py-3">Ações</th>
                    </tr>
                    </thead>
                    <tbody class="table-group-divider" wicket:id="rows">
                    <tr class="align-middle" wicket:id="editarForm">
                        <td class="fw-medium text-muted" wicket:id="id">?</td>
                        <td wicket:id="razaoSocial">?</td>
                        <td wicket:id="cnpj">?</td>
                        <td wicket:id="email">?</td>
                        <td><a class="btn btn-sm" wicket:id="toggleBtn"><span class="badge"
                                                                              wicket:id="statusBadge"></span></a></td>
                        <td>
                            <div class="d-flex gap-1">
                                <a class="btn btn-sm btn-outline-info rounded-circle p-1"
                                   style="width: 32px; height: 32px;"
                                   wicket:id="detalhesBtn">
                                    <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
                                </a>
                                <a class="btn btn-sm btn-primary rounded-pill px-3" wicket:id="editarBtn">
                                    <i data-lucide="edit" style="width: 14px; height: 14px;"></i> Editar
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3">
            <div class="d-flex justify-content-center" wicket:id="navigator"></div>
        </div>
    </div>
    <div wicket:id="exportModal"></div>
    <div wicket:id="importModal"></div>
    <div wicket:id="createModal"></div>
    <div wicket:id="editModalContainer">
        <div wicket:id="editModal"></div>
    </div>
</wicket:panel>
</html>

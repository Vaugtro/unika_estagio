<!DOCTYPE html>
<html lang="pt-br" xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i data-lucide="users"></i> Clientes Físicos
            </h5>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0" wicket:id="tableContainer">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr wicket:id="rows">
                        <form wicket:id="editarForm">
                            <td wicket:id="id">?</td>
                            <td><input wicket:id="nome" type="text"/></td>
                            <td wicket:id="cpf">?</td>
                            <td><input wicket:id="email" type="text"/></td>
                            <td><span wicket:id="status"></span></td>
                            <td class="d-flex gap-1">
                                <button type="submit" class="btn btn-sm btn-warning" wicket:id="editarBtn">
                                    <i data-lucide="save"></i> Salvar
                                </button>
<!--                                <a class="btn btn-sm" wicket:id="toggleAtivoBtn">-->
<!--                                    <i data-lucide="power"></i>-->
<!--                                </a>-->
                            </td>
                        </form>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white">
            <!--<div wicket:id="navigator" class="d-flex justify-content-center"></div>-->
        </div>
    </div>
</wicket:panel>
</html>

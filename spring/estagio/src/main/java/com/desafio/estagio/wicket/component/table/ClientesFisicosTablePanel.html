<!DOCTYPE html>
<html lang="pt-br" xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3" style="border-bottom: 3px solid #0d6efd;">
            <h5 class="mb-0 fw-semibold">
                <i data-lucide="users" style="width: 20px; height: 20px;"></i> Clientes Físicos
            </h5>
            <div class="d-flex gap-2">
                <a wicket:id="exportPdfBtn" class="btn btn-outline-danger btn-sm rounded-pill px-3">
                    <i data-lucide="file-text" style="width: 14px; height: 14px;"></i> PDF
                </a>
                <a wicket:id="exportXlsxBtn" class="btn btn-outline-success btn-sm rounded-pill px-3">
                    <i data-lucide="table" style="width: 14px; height: 14px;"></i> XLSX
                </a>
                <button type="button" class="btn btn-primary btn-sm rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#createClienteFisicoModal">
                    <i data-lucide="plus" style="width: 14px; height: 14px;"></i> Novo
                </button>
            </div>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" wicket:id="tableContainer">
                    <thead class="table-dark">
                    <tr>
                        <th class="py-3">ID</th>
                        <th class="py-3">Nome</th>
                        <th class="py-3">CPF</th>
                        <th class="py-3">Email</th>
                        <th class="py-3">Status</th>
                        <th class="py-3">Ações</th>
                    </tr>
                    </thead>
                    <tbody class="table-group-divider" wicket:id="rows">
                        <tr wicket:id="editarForm" class="align-middle">
                            <td class="fw-medium text-muted" wicket:id="id">?</td>
                            <td><input wicket:id="nome" type="text" class="form-control form-control-sm border-0 bg-light"/></td>
                            <td wicket:id="cpf">?</td>
                            <td><input wicket:id="email" type="text" class="form-control form-control-sm border-0 bg-light"/></td>
                            <td>
                                <a wicket:id="statusBtn" class="text-decoration-none">
                                    <span wicket:id="status"></span>
                                </a>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a class="btn btn-sm btn-outline-info rounded-circle p-1" wicket:id="detalhesBtn" style="width: 32px; height: 32px;">
                                        <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
                                    </a>
                                    <button type="submit" class="btn btn-sm btn-warning rounded-pill px-3" wicket:id="editarBtn">
                                        <i data-lucide="save" style="width: 14px; height: 14px;"></i> Salvar
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3">
            <div wicket:id="navigator" class="d-flex justify-content-center"></div>
        </div>
    </div>
    <div wicket:id="createModal"></div>
</wicket:panel>
</html>

<!DOCTYPE html>
<html lang="pt-br" xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3"
             style="border-bottom: 3px solid #0d6efd;">
            <h5 class="mb-0 fw-semibold">
                <i data-lucide="users" style="width: 20px; height: 20px;"></i> Clientes Físicos
            </h5>
            <div class="d-flex gap-2 align-items-center flex-wrap">
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" data-bs-target="#exportFisicoModal" data-bs-toggle="modal"
                        type="button">
                    <i data-lucide="download" style="width: 14px; height: 14px;"></i> Exportar
                </button>
                <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" data-bs-target="#importFisicoModal" data-bs-toggle="modal"
                        type="button">
                    <i data-lucide="upload" style="width: 14px; height: 14px;"></i> Importar
                </button>
                <button class="btn btn-primary btn-sm rounded-pill px-3" data-bs-target="#createClienteFisicoModal" data-bs-toggle="modal"
                        type="button">
                    <i data-lucide="plus" style="width: 14px; height: 14px;"></i> Novo
                </button>
            </div>
        </div>

        <div class="card-body p-0">
            <form wicket:id="searchForm" class="d-flex gap-2 p-3 border-bottom bg-light align-items-center">
                <i data-lucide="search" style="width: 18px; height: 18px; color: #6c757d;"></i>
                <input type="text" wicket:id="searchField" class="form-control form-control-sm"
                       placeholder="Buscar por nome, CPF, RG ou email..."/>
                <a wicket:id="clearSearchBtn" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i data-lucide="x" style="width: 14px; height: 14px;"></i> Limpar
                </a>
            </form>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" wicket:id="tableContainer">
                    <thead class="table-dark">
                    <tr>
                        <th class="py-3">ID</th>
                        <th class="py-3">Nome</th>
                        <th class="py-3">CPF</th>
                        <th class="py-3">Email</th>
                        <th class="py-3">Status</th>
                        <th class="py-3">Ações</th>
                    </tr>
                    </thead>
                    <tbody class="table-group-divider" wicket:id="rows">
                    <tr class="align-middle" wicket:id="editarForm">
                        <td class="fw-medium text-muted" wicket:id="id">?</td>
                        <td><input class="form-control form-control-sm border-0 bg-light" type="text" wicket:id="nome"/>
                        </td>
                        <td wicket:id="cpf">?</td>
                        <td><input class="form-control form-control-sm border-0 bg-light" type="text"
                                   wicket:id="email"/></td>
                        <td>
                            <a class="text-decoration-none" wicket:id="statusBtn">
                                <span wicket:id="status"></span>
                            </a>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <a class="btn btn-sm btn-outline-info rounded-circle p-1" style="width: 32px; height: 32px;"
                                   wicket:id="detalhesBtn">
                                    <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
                                </a>
                                <button class="btn btn-sm btn-warning rounded-pill px-3" type="submit"
                                        wicket:id="editarBtn">
                                    <i data-lucide="save" style="width: 14px; height: 14px;"></i> Salvar
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3">
            <div class="d-flex justify-content-center" wicket:id="navigator"></div>
        </div>
    </div>
    <div wicket:id="exportModal"></div>
    <div wicket:id="importModal"></div>
    <div wicket:id="createModal"></div>
</wicket:panel>
</html>

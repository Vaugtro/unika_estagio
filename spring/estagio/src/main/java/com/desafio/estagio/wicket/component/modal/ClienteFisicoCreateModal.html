<wicket:panel>
    <style>
        .is-invalid {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;
        }
        .feedbackPanelERROR {
            color: #dc3545;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }
        .endereco-table th {
            white-space: nowrap;
            font-size: 0.8rem;
            text-align: center;
        }
        .endereco-table td {
            vertical-align: middle;
        }
        .endereco-table .form-control-sm {
            font-size: 0.8rem;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function() {
            $('[data-mask]').each(function() {
                $(this).mask($(this).data('mask'));
            });
        });
    </script>
    <div class="modal fade" id="createClienteFisicoModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-xl" role="document">
            <div class="modal-content" style="border-radius: 12px; overflow: hidden;">
                <form wicket:id="form">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-semibold">
                            <i data-lucide="user-plus"></i> Novo Cliente Físico
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted mb-1">CPF</label>
                                <input type="text" wicket:id="cpf" class="form-control form-control-sm" placeholder="000.000.000-00"/>
                                <span wicket:id="cpfFeedback" class="invalid-feedback"></span>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted mb-1">RG</label>
                                <input type="text" wicket:id="rg" class="form-control form-control-sm" placeholder="RG"/>
                                <span wicket:id="rgFeedback" class="invalid-feedback"></span>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-medium text-muted mb-1">Nome Completo</label>
                                <input type="text" wicket:id="nome" class="form-control form-control-sm" placeholder="Nome completo"/>
                                <span wicket:id="nomeFeedback" class="invalid-feedback"></span>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted mb-1">E-mail</label>
                                <input type="text" wicket:id="email" class="form-control form-control-sm" placeholder="email@exemplo.com"/>
                                <span wicket:id="emailFeedback" class="invalid-feedback"></span>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted mb-1">Data de Nascimento</label>
                                <input type="text" wicket:id="dataNascimento" class="form-control form-control-sm" placeholder="YYYY-MM-DD"/>
                                <span wicket:id="dataNascimentoFeedback" class="invalid-feedback"></span>
                            </div>
                        </div>
                        <hr class="my-4">
                        <h6 class="fw-semibold mb-3"><i data-lucide="map-pin" style="width: 16px; height: 16px;"></i> Endereços</h6>
                        <div wicket:id="enderecosContainer"></div>
                    </div>
                    <div class="modal-footer border-top-0 pt-0">
                        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" wicket:id="submit" class="btn btn-primary rounded-pill px-4">
                            <i data-lucide="save" style="width: 16px; height: 16px;"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</wicket:panel>

<wicket:panel>
    <style>
        .is-invalid {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;
        }
        .feedbackPanelERROR {
            color: #dc3545;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }
        .endereco-table th {
            white-space: nowrap;
            font-size: 0.8rem;
            text-align: center;
        }
        .endereco-table td {
            vertical-align: middle;
        }
        .endereco-table .form-control-sm {
            font-size: 0.8rem;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        $(document).ready(function() {
            $('[data-mask]').each(function() {
                $(this).mask($(this).data('mask'));
            });
        });
    </script>
    <div class="modal fade" id="createClienteFisicoModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-xl" role="document">
            <div class="modal-content">
                <form wicket:id="form">
                    <div class="modal-header">
                        <h5 class="modal-title">Novo Cliente Físico</h5>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <input type="text" wicket:id="cpf" class="form-control"/>
                            <span wicket:id="cpfFeedback" class="invalid-feedback"></span>
                        </div>
                        <div class="mb-3">
                            <input type="text" wicket:id="nome" class="form-control"/>
                            <span wicket:id="nomeFeedback" class="invalid-feedback"></span>
                        </div>
                        <div class="mb-3">
                            <input type="text" wicket:id="rg" class="form-control"/>
                            <span wicket:id="rgFeedback" class="invalid-feedback"></span>
                        </div>
                        <div class="mb-3">
                            <input type="text" wicket:id="email" class="form-control"/>
                            <span wicket:id="emailFeedback" class="invalid-feedback"></span>
                        </div>
                        <div class="mb-3">
                            <input type="text" wicket:id="dataNascimento" class="form-control" placeholder="YYYY-MM-DD"/>
                            <span wicket:id="dataNascimentoFeedback" class="invalid-feedback"></span>
                        </div>
                        <hr>
                        <h6>Endereços</h6>
                        <div wicket:id="enderecosContainer"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" wicket:id="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</wicket:panel>

<wicket:panel xmlns:wicket="http://www.w3.org/1999/xhtml">
    <style>
        .is-invalid {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;
        }

        .feedbackPanelERROR {
            color: #dc3545;
            font-size: 0.8rem;
            margin-top: 0.25rem;
        }

        .endereco-table th {
            white-space: nowrap;
            font-size: 0.8rem;
            text-align: center;
        }

        .endereco-table td {
            vertical-align: middle;
        }

        .endereco-table .form-control-sm {
            font-size: 0.8rem;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    <script>
        // aplicarMascaras() loaded from masks.js via JavaScriptResourceReference in renderHead()

        $(document).ready(function () {
            aplicarMascaras();
        });

        $('#createClienteFisicoModal').on('shown.bs.modal', function () {
            aplicarMascaras();
        });
    </script>
    <div aria-hidden="true" class="modal fade" id="createClienteFisicoModal" role="dialog" tabindex="-1">
        <div class="modal-dialog modal-xl" role="document">
            <div class="modal-content" style="border-radius: 12px; overflow: hidden;">
                <form wicket:id="form">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-semibold">
                            <i data-lucide="user-plus"></i> Novo Cliente Físico
                        </h5>
                        <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted mb-1">CPF</label>
                                <input class="form-control form-control-sm" placeholder="000.000.000-00" type="text"
                                       wicket:id="cpf"/>
                                <span class="invalid-feedback" wicket:id="cpfFeedback"></span>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted mb-1">RG</label>
                                <input class="form-control form-control-sm" placeholder="RG" type="text"
                                       wicket:id="rg"/>
                                <span class="invalid-feedback" wicket:id="rgFeedback"></span>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-medium text-muted mb-1">Nome Completo</label>
                                <input class="form-control form-control-sm" placeholder="Nome completo" type="text"
                                       wicket:id="nome"/>
                                <span class="invalid-feedback" wicket:id="nomeFeedback"></span>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted mb-1">E-mail</label>
                                <input class="form-control form-control-sm" placeholder="email@exemplo.com" type="text"
                                       wicket:id="email"/>
                                <span class="invalid-feedback" wicket:id="emailFeedback"></span>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-medium text-muted mb-1">Data de Nascimento</label>
                                <input class="form-control form-control-sm" placeholder="DD/MM/YYYY" type="text"
                                       wicket:id="dataNascimento"/>
                                <span class="invalid-feedback" wicket:id="dataNascimentoFeedback"></span>
                            </div>
                        </div>
                        <hr class="my-4">
                        <h6 class="fw-semibold mb-3"><i data-lucide="map-pin" style="width: 16px; height: 16px;"></i>
                            Endereços</h6>
                        <div wicket:id="enderecosContainer"></div>
                    </div>
                    <div class="modal-footer border-top-0 pt-0">
                        <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal" type="button">Cancelar
                        </button>
                        <button class="btn btn-primary rounded-pill px-4" type="submit" wicket:id="submit">
                            <i data-lucide="save" style="width: 16px; height: 16px;"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</wicket:panel>

<!DOCTYPE html>
<html lang="pt-BR" xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8">
    <title>My App</title>
    <wicket:head>
        <!-- CSS from CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com" rel="preconnect">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@latest"></script>

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

        <!-- Bootstrap 5 JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <style>
            body {
                font-family: 'Inter', sans-serif;
                background-color: #f8f9fa;
            }
        </style>

        <script>
            // Initialize Lucide icons
            document.addEventListener('DOMContentLoaded', function () {
                lucide.createIcons();
            });

            // Reinitialize after Wicket AJAX updates
            if (typeof Wicket !== 'undefined') {
                Wicket.Event.subscribe('/ajax/call/response', function () {
                    lucide.createIcons();
                });
            }
        </script>
    </wicket:head>
</head>
<body>
<header class="navbar navbar-dark bg-dark shadow-sm">
    <div wicket:id="debug"></div>
    <div class="container">
        <a class="navbar-brand" href="#">Desafio Estágio</a>
    </div>
</header>

<main class="container mt-4">
    <wicket:child/> <!-- Child page content goes here -->
</main>
</body>
</html>

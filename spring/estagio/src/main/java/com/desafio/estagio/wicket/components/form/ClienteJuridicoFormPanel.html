<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="cliente-juridico">
        <h4>Dados da Empresa</h4>

        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Razão Social *</label>
                <input type="text" wicket:id="razaoSocial" class="form-control" />
            </div>

            <div class="col-md-6">
                <label class="form-label">Nome Fantasia *</label>
                <input type="text" wicket:id="nomeFantasia" class="form-control" />
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label">CNPJ * (00.000.000/0000-00)</label>
                <input type="text" wicket:id="cnpj" class="form-control" placeholder="00.000.000/0000-00" />
            </div>

            <div class="col-md-4">
                <label class="form-label">Inscrição Estadual</label>
                <input type="text" wicket:id="inscricaoEstadual" class="form-control" />
            </div>
        </div>

        <h4 class="mt-3">Endereços</h4>

        <div wicket:id="enderecos" class="mb-3">
            <div class="card mb-3">
                <div class="card-header">
                    <strong>Endereço <span wicket:id="indice"></span></strong>
                    <button type="button" wicket:id="remover" class="btn btn-sm btn-danger float-end">
                        Remover
                    </button>
                </div>
                <div class="card-body">
                    <div class="row mb-2">
                        <div class="col-md-6">
                            <label class="form-label">Logradouro *</label>
                            <input type="text" wicket:id="logradouro" class="form-control" />
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Número *</label>
                            <input type="number" wicket:id="numero" class="form-control" />
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Complemento</label>
                            <input type="text" wicket:id="complemento" class="form-control" />
                        </div>
                    </div>

                    <div class="row mb-2">
                        <div class="col-md-3">
                            <label class="form-label">CEP * (00000-000)</label>
                            <input type="text" wicket:id="cep" class="form-control" placeholder="00000-000" />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Bairro *</label>
                            <input type="text" wicket:id="bairro" class="form-control" />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Cidade *</label>
                            <input type="text" wicket:id="cidade" class="form-control" />
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Estado * (UF)</label>
                            <input type="text" wicket:id="estado" class="form-control" maxlength="2" placeholder="SP" />
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label">Telefone * ((00) 00000-0000)</label>
                            <input type="text" wicket:id="telefone" class="form-control" placeholder="(00) 00000-0000" />
                        </div>
                        <div class="col-md-3">
                            <div class="form-check mt-4">
                                <input type="checkbox" wicket:id="principal" class="form-check-input" />
                                <label class="form-check-label">
                                    <strong>Endereço Principal</strong>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</wicket:panel>
</html>

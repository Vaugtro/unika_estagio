<wicket:panel xmlns:wicket="http://www.w3.org/1999/xhtml">
    <div aria-hidden="true" class="modal fade" role="dialog" tabindex="-1" wicket:id="modalRoot">
        <div class="modal-dialog modal-sm modal-dialog-centered" role="document">
            <div class="modal-content" style="border-radius: 12px;">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-semibold">
                        <i data-lucide="download" style="width: 18px; height: 18px;"></i> Exportar
                    </h5>
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <div class="modal-body">
                    <div class="d-grid gap-2">
                        <a class="btn btn-outline-danger btn-lg rounded-pill py-3" wicket:id="exportPdf">
                            <i data-lucide="file-text" style="width: 20px; height: 20px;"></i> Exportar PDF
                        </a>
                        <a class="btn btn-outline-success btn-lg rounded-pill py-3" wicket:id="exportXlsx">
                            <i data-lucide="table" style="width: 20px; height: 20px;"></i> Exportar XLSX
                        </a>
                    </div>
                </div>
                <div class="modal-footer border-top-0 justify-content-center">
                    <button class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal" type="button">Fechar
                    </button>
                </div>
            </div>
        </div>
    </div>
</wicket:panel>
